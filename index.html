<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Bajo el Telón - Documental interactivo sobre la reconstrucción del teatro">
  <meta name="theme-color" content="#1e3b4a">
  <title>Bajo el telón</title>
  
  <!-- Precargas críticas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="img/1080.jpg" as="image" media="(min-width: 768px)">
  
  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  
  <!-- Estilos -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- ==================== NAVEGACIÓN ==================== -->
  <nav class="navbar">
    <div class="logo">BAJO EL TELÓN</div>
    <button class="menu-toggle" aria-label="Menú de navegación">
      <i class="fas fa-bars"></i>
    </button>
    <ul class="nav-links"></ul>
  </nav>

  <!-- ==================== CONTENIDO PRINCIPAL ==================== -->
  <main>
    <!-- Hero / Inicio -->
    <section id="inicio" class="hero">
      <div class="hero-content">
        <h1 class="hero-title"></h1>
        <p class="hero-subtitle"></p>
        <a href="#timeline" class="btn hero-btn"></a>
      </div>
    </section>

    <!-- Timeline -->
    <section id="timeline">
      <h2 class="section-title timeline-section-title"></h2>
      <div class="timeline-vertical"></div>
    </section>

    <!-- El Caso / Investigación -->
    <section id="el-caso">
      <h2 class="section-title case-section-title"></h2>
      <div class="case-content">
        <div class="case-text">
          <p class="case-description"></p>
          <div class="case-stats"></div>
        </div>
        <div class="case-image">
          <img src="" alt="Infografía del caso" class="case-img">
        </div>
      </div>
    </section>

    <!-- Reportaje / Revista Digital -->
    <section id="reportaje">
      <h2 class="section-title reportaje-section-title"></h2>
      <div class="reportaje-destacado" id="openReportajeModal">
        <img class="reportaje-hero-img" alt="Reportaje destacado">
        <div class="reportaje-texto">
          <h3 class="reportaje-title"></h3>
          <p class="reportaje-preview"></p>
          <span class="leer-mas"></span>
        </div>
      </div>
    </section>
    
    <!-- Gamificación / Juego -->
    <section id="gamificacion">
      <h2 class="section-title game-section-title"></h2>
      <div class="game-preview">
        <div class="game-mockup"></div>
        <div class="game-info">
          <h3 class="game-title"></h3>
          <p class="game-description"></p>
          <a href="#" class="btn game-btn"></a>
        </div>
      </div>
    </section>

    <!-- Comic -->
    <section id="comic">
      <h2 class="section-title comic-section-title"></h2>
      <div class="comic-container">
        <div class="comic-preview">
          <div class="comic-cover">
            <img src="" alt="Portada del comic" class="comic-cover-img">
          </div>
          <div class="comic-info">
            <h3 class="comic-title"></h3>
            <p class="comic-description"></p>
            <div class="comic-pages-preview"></div>
            <a href="#" class="btn comic-btn">📖 Leer comic completo</a>
          </div>
        </div>
      </div>
    </section>

    <!-- Countdown / Evento -->
    <section id="countdown" class="countdown-section">
      <div class="countdown-container">
        <h2 class="section-title countdown-title"></h2>
        <div class="countdown-timer">
          <div class="countdown-box">
            <div class="countdown-number" id="days">00</div>
            <div class="countdown-label">Días</div>
          </div>
          <div class="countdown-box">
            <div class="countdown-number" id="hours">00</div>
            <div class="countdown-label">Horas</div>
          </div>
          <div class="countdown-box">
            <div class="countdown-number" id="minutes">00</div>
            <div class="countdown-label">Minutos</div>
          </div>
          <div class="countdown-box">
            <div class="countdown-number" id="seconds">00</div>
            <div class="countdown-label">Segundos</div>
          </div>
        </div>
        <p class="countdown-event"></p>
      </div>
    </section>

    <!-- Galería -->
    <section id="galeria">
      <h2 class="section-title gallery-title"></h2>
      <div class="gallery-grid"></div>
    </section>

    <!-- Redes Sociales -->
    <section id="redes" class="social-section">
      <h2 class="section-title social-title"></h2>
      <div class="social-icons"></div>
    </section>

    <!-- Créditos / Equipo -->
    <section id="creditos">
      <h2 class="section-title credits-title"></h2>
      <div class="credits-grid"></div>
    </section>

    <!-- Contacto -->
    <section id="contact">
      <h2 class="section-title contact-title"></h2>
      <div class="contact-container">
        <form class="contact-form" id="contactForm">
          <div class="form-group">
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <input type="email" id="email" name="email" placeholder="Tu correo electrónico" required>
          </div>
          <div class="form-group">
            <input type="text" id="asunto" name="asunto" placeholder="Asunto">
          </div>
          <div class="form-group">
            <textarea id="mensaje" name="mensaje" rows="5" placeholder="Tu mensaje" required></textarea>
          </div>
          <button type="submit" class="btn contact-submit-btn">Enviar mensaje</button>
        </form>
        <div class="contact-info">
          <div class="contact-info-item">
            <i class="fas fa-envelope"></i>
            <p>bajoeltelon26@gmail.com</p>
          </div>
          <div class="contact-info-item">
            <i class="fas fa-phone"></i>
            <p>+51 987 654 321</p>
          </div>
          <div class="contact-info-item">
            <i class="fas fa-map-marker-alt"></i>
            <p>Piura, Perú</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer>
    <p class="footer-email"></p>
    <p class="footer-copyright"></p>
    <button class="back-to-top" aria-label="Volver al inicio">
      ↑ Volver arriba
    </button>
  </footer>

  <!-- ==================== MODALES ==================== -->
  <!-- Modal Reportaje -->
  <div id="reportajeModal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h2><i class="fas fa-newspaper"></i> Reportaje Exclusivo</h2>
        <button class="modal-close" aria-label="Cerrar modal">&times;</button>
      </div>
      <div class="modal-body"></div>
    </div>
  </div>

  <!-- Modal Lightbox -->
  <div id="lightboxModal" class="lightbox-modal">
    <button class="lightbox-close" aria-label="Cerrar lightbox">&times;</button>
    <img class="lightbox-img" src="" alt="Imagen ampliada">
  </div>

  <!-- Modal Genérico -->
  <div id="genericModal" class="generic-modal">
    <div class="generic-modal-content">
      <p id="modalMessage"></p>
      <button class="generic-modal-close" type="button">Cerrar</button>
    </div>
  </div>

  <!-- Modal Comic -->
  <div id="comicModal" class="modal-overlay">
    <div class="modal-container modal-comic">
      <div class="modal-header">
        <h2><i class="fas fa-book-open"></i> Comic: <span class="comic-modal-title"></span></h2>
        <button class="modal-close" aria-label="Cerrar modal">&times;</button>
      </div>
      <div class="modal-body comic-modal-body"></div>
    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/hero.js"></script>
  <script src="js/components/timeline.js"></script>
  <script src="js/components/case.js"></script>
  <script src="js/components/reportaje.js"></script>
  <script src="js/components/game.js"></script>
  <script src="js/components/comic.js"></script>
  <script src="js/components/countdown.js"></script>
  <script src="js/components/gallery.js"></script>
  <script src="js/components/social.js"></script>
  <script src="js/components/credits.js"></script>
  <script src="js/components/contact.js"></script>
  <script src="js/components/footer.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
